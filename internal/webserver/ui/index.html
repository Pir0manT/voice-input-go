<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Input Go - Настройки</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>⚙️ Настройки</h1>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="general">Основные</button>
            <button class="tab-btn" data-tab="notifications">Уведомления</button>
            <button class="tab-btn" data-tab="logs">Логи</button>
        </div>

        <div class="tab-content active" id="general">
            <h2>Горячие клавиши</h2>
            <div class="form-group">
                <label>Начать запись:</label>
                <input type="text" id="hotkey-start" value="Alt+R">
            </div>
            <div class="form-group">
                <label>Остановить:</label>
                <input type="text" id="hotkey-stop" value="Alt+S">
            </div>
            <div class="form-group">
                <label>Редактор:</label>
                <input type="text" id="hotkey-editor" value="Alt+E">
            </div>

            <h2>Lemonade Server</h2>
            <div class="form-group">
                <label>URL:</label>
                <input type="text" id="lemonade-url" value="http://localhost:8000">
            </div>
            <div class="form-group">
                <label>Модель:</label>
                <select id="lemonade-model">
                    <option value="Whisper-Large-v3-Turbo">Whisper-Large-v3-Turbo</option>
                </select>
            </div>
            <div class="form-group">
                <label>Язык:</label>
                <select id="lemonade-language">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>

            <h2>Автозапуск</h2>
            <div class="form-group checkbox">
                <input type="checkbox" id="autostart">
                <label for="autostart">Запускать при старте системы</label>
            </div>
            <p class="hint">Приложение будет запускаться автоматически при входе в систему</p>

            <h2>Язык интерфейса</h2>
            <div class="form-group">
                <label>Язык приложения:</label>
                <select id="app-language">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>

        <div class="tab-content" id="notifications">
            <h2>Уведомления</h2>
            <div class="form-group checkbox">
                <input type="checkbox" id="notify-sound" checked>
                <label for="notify-sound">Звуковой сигнал</label>
            </div>
            <div class="form-group checkbox">
                <input type="checkbox" id="notify-toast" checked>
                <label for="notify-toast">Всплывающее уведомление</label>
            </div>
        </div>

        <div class="tab-content" id="logs">
            <h2>Логирование</h2>
            <div class="form-group checkbox">
                <input type="checkbox" id="logging-enabled" checked>
                <label for="logging-enabled">Включить логирование</label>
            </div>
            <div class="form-group">
                <label>Уровень:</label>
                <select id="logging-level">
                    <option value="info">INFO</option>
                    <option value="debug">DEBUG</option>
                    <option value="warn">WARN</option>
                    <option value="error">ERROR</option>
                </select>
            </div>
            <div class="form-group">
                <label>Последние логи:</label>
                <textarea id="logs-content" rows="10" readonly style="width: 100%; font-family: monospace; background: #1e1e1e; color: #d4d4d4; border: 1px solid #3e3e42; padding: 8px;"></textarea>
            </div>
            <div class="log-actions">
                <button id="btn-view-logs">🔄 Обновить логи</button>
                <button id="btn-clear-logs" class="danger">🗑 Очистить</button>
                <button id="btn-save-logs">💾 Сохранить в файл</button>
            </div>
        </div>

        <div class="actions">
            <button id="btn-save" class="btn-primary">Сохранить</button>
            <button id="btn-cancel" class="btn-secondary">Отмена</button>
        </div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
